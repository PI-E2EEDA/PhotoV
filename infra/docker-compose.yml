services:
  proxy:
    build: ../proxy/
    image: photov/proxy
    environment:
      DOMAIN: ${DOMAIN}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./data/caddy_data:/data
      - ./data/caddy_config:/config

  frontend:
    build:
      context: ../frontend
      dockerfile: "../frontend/deploy/Dockerfile"
      network: host
    image: photov/frontend

  api:
    build:
      context: ../backend
      network: host
    image: photov/backend
    volumes:
      - ../backend:/app
      - /app/.venv
    env_file:
      - ../backend/.env
    environment:
      POSTGRES_PASSWORD: "${DB_PWD:-demo}"
      POSTGRES_USER: photov
      POSTGRES_DB: photov
      DB_HOST: db

  db:
    image: postgres:15-alpine
    restart: always
    shm_size: 128mb
    environment:
      POSTGRES_PASSWORD: "${DB_PWD:-demo}"
      POSTGRES_USER: photov
      POSTGRES_DB: photov
    volumes:
      - ./data/pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"