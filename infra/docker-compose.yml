services:
  proxy:
    build: ../proxy/
    image: photov/proxy
    ports:
      - "80:80"
      - "443:443"
  frontend:
    build:
      context: ../frontend
      dockerfile: "../frontend/deploy/Dockerfile"
      network: host
    image: photov/frontend

  api:
    build:
      context: ../backend
      network: host
    image: photov/backend

  # See docs on https://hub.docker.com/_/postgres
  db:
    image: postgres
    restart: always
    shm_size: 128mb
    environment:
      POSTGRES_PASSWORD: "${DB_PWD}"
    volumes:
      - ./data/pgdata:/var/lib/postgresql/18/docker
