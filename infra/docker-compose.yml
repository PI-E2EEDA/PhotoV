services:
  proxy:
    restart: "unless-stopped"
    build: ../proxy/
    image: photov/proxy
    environment:
      DOMAIN: ${DOMAIN}
    # https://caddyserver.com/docs/running#docker-compose
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./data/caddy_data:/data
      - ./data/caddy_config:/config

  frontend:
    restart: "unless-stopped"
    build:
      context: ../frontend
      dockerfile: "../frontend/deploy/Dockerfile"
      network: host
    image: photov/frontend

  api:
    restart: "unless-stopped"
    build:
      context: ../backend
      network: host
    volumes:
      - ./creds:/creds
    image: photov/backend
    environment:
      PHOTOV_DOMAIN: ${DOMAIN}
      CREDS_FOLDER: "/creds"
      AUTH_SERVER_SECRET: "${AUTH_SERVER_SECRET}"
      # Make sure to keep that in sync with db service
      POSTGRES_PASSWORD: "${DB_PWD}"
      POSTGRES_USER: photov
      POSTGRES_DB: photov
      DB_HOST: db # the other database service hostname
      PV_REMOTE_ENABLED: "${PV_REMOTE_ENABLED}"
      PV_REMOTE_BASE_URL: "${PV_REMOTE_BASE_URL}"
      PV_REMOTE_TOKEN: "${PV_REMOTE_TOKEN:-}"
      PV_REMOTE_AUTH_SCHEME: "${PV_REMOTE_AUTH_SCHEME}"
      PV_REMOTE_LOGIN_PATH: "${PV_REMOTE_LOGIN_PATH:-/auth/login}"
      PV_REMOTE_USERNAME: "${PV_REMOTE_USERNAME:-}"
      PV_REMOTE_PASSWORD: "${PV_REMOTE_PASSWORD:-}"
      PV_REMOTE_MEASURES_PATH: "${PV_REMOTE_MEASURES_PATH}"
      PV_REMOTE_TIMEOUT_S: "${PV_REMOTE_TIMEOUT_S}"
      PV_REMOTE_WINDOW_MINUTES: "${PV_REMOTE_WINDOW_MINUTES}"
      PV_REMOTE_INSTALLATION_ID: "${PV_REMOTE_INSTALLATION_ID}"

  # See docs on https://hub.docker.com/_/postgres
  db:
    image: postgres
    restart: always
    shm_size: 128mb
    environment:
      POSTGRES_PASSWORD: "${DB_PWD}"
      POSTGRES_USER: photov
      POSTGRES_DB: photov
    volumes:
      - ./data/pgdata:/var/lib/postgresql/18/docker
    # Only enable this in development !
    ports:
      - "5432:5432"

  # A simple container that does regular backups and allow restoration.
  # See backups/README.md
  backups:
    image: photov/backups
    build:
      context: ../backups
      network: host
    command: ["backup"] # run the subcommand backup
    restart: always
    environment:
      BACKUPS_INTERVAL_MINUTES: 60
      BACKUPS_FOLDER: "/backups"
      POSTGRES_PASSWORD: "${DB_PWD}"
      POSTGRES_USER: photov
      POSTGRES_DB: photov
      DB_HOST: db # the other database service hostname
    volumes:
      - ./data/backups:/backups
